services:

  backend:

    build:
      context: ./backend

    ports:
      - "5003:5002"

    environment:
      - PORT=5002

    restart: always

  frontend:

    build:
      context: ./frontend

    ports:
      - "3001:3000"

    environment:
      - HOST=0.0.0.0
      - CHOKIDAR_USEPOLLING=true

    restart: always

    depends_on:
      - backend